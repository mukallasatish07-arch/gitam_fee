<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Internship Fee Payment</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#eef2f3;
}

.topbar{
  background:#0b7a6f;
  color:white;
  padding:16px 20px;
}

.topbar-content{
  max-width:900px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
}

.logo{
  height:46px;
  width:auto;
  object-fit:contain;
}

.topbar-title{
  font-size:24px;
  font-weight:bold;
}

@media(max-width:700px){
  .topbar-content{
    gap:10px;
  }

  .logo{
    height:34px;
  }

  .topbar-title{
    font-size:18px;
  }
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:16px;
padding:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.fee{
display:flex;
justify-content:space-between;
background:#f6fbfb;
padding:16px;
border-radius:10px;
margin-top:10px;
font-size:20px;
font-weight:bold;
}

.amount{
color:#0b7a6f;
font-size:26px;
}

.actions{
text-align:center;
margin-top:25px;
}

button{
background:#0b7a6f;
color:white;
border:none;
padding:14px 24px;
font-size:18px;
border-radius:8px;
cursor:pointer;
margin:6px;
}

button:hover{
background:#095f56;
}

.receipt{
display:none;
margin-top:30px;
border:2px dashed #0b7a6f;
padding:20px;
border-radius:12px;
}

.receipt-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.box{
background:#f4fafa;
padding:12px;
border-radius:8px;
}

@media(max-width:700px){

.row{
grid-template-columns:1fr;
}

.receipt-grid{
grid-template-columns:1fr;
}

}

@media print{

body *{
visibility:hidden;
}

#receiptSection,#receiptSection *{
visibility:visible;
}

#receiptSection{
position:absolute;
top:0;
left:0;
width:100%;
display:block !important;
}

button{
display:none;
}

}

</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-content">
    <img src="logo.png" alt="GITAM Logo" class="logo">
    <div class="topbar-title">Internship Fee Payment</div>
  </div>
</div>

<div class="container">

<div class="card">

<h1>Internship Fee</h1>

<div class="row">

<div>
<label>Student Name</label>
<input type="text" id="name" value="AREPALLI SATISH KUMAR">
</div>

<div>
<label>Roll Number</label>
<input type="text" id="roll" value="2023001793">
</div>

</div>

<div class="row">

<div>
<label>Branch</label>
<input type="text" id="branch" value="CSE">
</div>

<div>
<label>Academic Year</label>
<select id="year">
<option>1st Year</option>
<option selected>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</div>

</div>

<div class="fee">
<div>Internship Fee</div>
<div class="amount">₹13,500</div>
</div>

<div class="actions">

<button onclick="pay()">Proceed to Pay</button>

<button onclick="receipt()">I Have Paid</button>

</div>

<div class="receipt" id="receiptSection">

<h2>Payment Receipt</h2>

<div class="receipt-grid">

<div class="box">
<b>Student Name</b><br>
<span id="rname"></span>
</div>

<div class="box">
<b>Roll Number</b><br>
<span id="rroll"></span>
</div>

<div class="box">
<b>Branch</b><br>
<span id="rbranch"></span>
</div>

<div class="box">
<b>Academic Year</b><br>
<span id="ryear"></span>
</div>

<div class="box">
<b>Fee Type</b><br>
Internship Fee
</div>

<div class="box">
<b>Amount</b><br>
₹13,500
</div>

<div class="box">
<b>Payment Mode</b><br>
UPI
</div>

<div class="box">
<b>Receipt Number</b><br>
<span id="rid"></span>
</div>

<div class="box">
<b>Date</b><br>
<span id="rdate"></span>
</div>

<div class="box">
<b>Status</b><br>
Payment Completed
</div>

</div>

<br>

<button onclick="window.print()">Print Receipt</button>

</div>

</div>
</div>

<script>

function pay(){

let upi="8328688331-2@ybl";
let name="GITAM UNIVERSITY";
let amount="13500";

let link=`upi://pay?pa=${upi}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR&tn=Internship Fee`;

window.location.href=link;

}

function receipt(){

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;
let branch=document.getElementById("branch").value;
let year=document.getElementById("year").value;

document.getElementById("rname").innerText=name;
document.getElementById("rroll").innerText=roll;
document.getElementById("rbranch").innerText=branch;
document.getElementById("ryear").innerText=year;

document.getElementById("rid").innerText="REC"+Date.now();

document.getElementById("rdate").innerText=new Date().toLocaleString();

document.getElementById("receiptSection").style.display="block";

window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
